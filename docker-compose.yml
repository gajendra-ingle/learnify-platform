version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - learnify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - learnify-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  postgres-course:
    image: postgres:15-alpine
    container_name: postgres-course
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_course_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  postgres-lesson:
    image: postgres:15-alpine
    container_name: postgres-lesson
    environment:
      POSTGRES_DB: lesson_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_lesson_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  postgres-enrollment:
    image: postgres:15-alpine
    container_name: postgres-enrollment
    environment:
      POSTGRES_DB: enrollment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_enrollment_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  postgres-review:
    image: postgres:15-alpine
    container_name: postgres-review
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_review_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  postgres-analytics:
    image: postgres:15-alpine
    container_name: postgres-analytics
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    networks:
      - learnify-network

  redis:
    image: redis:7-alpine
    container_name: learnify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - learnify-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: learnify-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - learnify-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: learnify-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - learnify-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: learnify-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8092:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: learnify
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - learnify-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: learnify-zipkin
    ports:
      - "9411:9411"
    networks:
      - learnify-network

  # ─── Platform Services ────────────────────────────────────
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
    networks:
      - learnify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: service-registry
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - learnify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      REDIS_HOST: redis
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNA==
    networks:
      - learnify-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://service-registry:8761/eureka/
      REDIS_HOST: redis
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNA==
    networks:
      - learnify-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-user:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      DB_HOST: postgres-user
      EUREKA_URL: http://service-registry:8761/eureka/
      REDIS_HOST: redis
    networks:
      - learnify-network

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: course-service
    ports:
      - "8083:8083"
    depends_on:
      postgres-course:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-course
      EUREKA_URL: http://service-registry:8761/eureka/
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
    networks:
      - learnify-network

  lesson-service:
    build:
      context: ./lesson-service
      dockerfile: Dockerfile
    container_name: lesson-service
    ports:
      - "8084:8084"
    depends_on:
      postgres-lesson:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      DB_HOST: postgres-lesson
      EUREKA_URL: http://service-registry:8761/eureka/
    networks:
      - learnify-network

  enrollment-service:
    build:
      context: ./enrollment-service
      dockerfile: Dockerfile
    container_name: enrollment-service
    ports:
      - "8085:8085"
    depends_on:
      postgres-enrollment:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-enrollment
      EUREKA_URL: http://service-registry:8761/eureka/
      KAFKA_SERVERS: kafka:29092
    networks:
      - learnify-network

  review-service:
    build:
      context: ./review-service
      dockerfile: Dockerfile
    container_name: review-service
    ports:
      - "8086:8086"
    depends_on:
      postgres-review:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      DB_HOST: postgres-review
      EUREKA_URL: http://service-registry:8761/eureka/
    networks:
      - learnify-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8087:8087"
    depends_on:
      postgres-payment:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-payment
      EUREKA_URL: http://service-registry:8761/eureka/
      KAFKA_SERVERS: kafka:29092
    networks:
      - learnify-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8090:8090"
    depends_on:
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      KAFKA_SERVERS: kafka:29092
    networks:
      - learnify-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8091:8091"
    depends_on:
      postgres-analytics:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres-analytics
      EUREKA_URL: http://service-registry:8761/eureka/
      KAFKA_SERVERS: kafka:29092
    networks:
      - learnify-network

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_course_data:
  postgres_lesson_data:
  postgres_enrollment_data:
  postgres_review_data:
  postgres_payment_data:
  postgres_analytics_data:
  redis_data:

networks:
  learnify-network:
    driver: bridge
